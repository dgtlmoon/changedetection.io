[alembic]
script_location = migrations
prepend_sys_path = .
timezone = UTC
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s
path_separator = os

# The DB URL is resolved dynamically in migrations/env.py from
# CORE_DATABASE_ADMIN_URL.
sqlalchemy.url =

# Distinct version table so we don't collide with the identity
# service's alembic_version.
version_table = alembic_version_core

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
